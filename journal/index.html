<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mistwalker Session Journal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
:root {
  --bg: #0a0a0c;
  --panel: rgba(18, 18, 20, 0.82);
  --panel-strong: rgba(14, 14, 16, 0.92);
  --text: #ddd6c8;
  --muted: #a69d8e;
  --line: rgba(202, 183, 143, 0.18);
  --gold: #a98d59;
  --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
  --danger: #9f5d5d;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: linear-gradient(to bottom, #0b0b0d, #101014, #0b0b0d);
  color: var(--text);
  font-family: 'EB Garamond', serif;
}

/* =========================
   LAYOUT
========================= */
.page-wrap {
  width: min(1000px, calc(100% - 32px));
  margin: 0 auto;
  padding: 48px 0 70px;
}

/* =========================
   HERO
========================= */
.hero {
  text-align: center;
  padding: 56px 24px 40px;
  margin-bottom: 28px;
  border: 1px solid var(--line);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.eyebrow {
  letter-spacing: 0.24em;
  text-transform: uppercase;
  font-size: 0.8rem;
  color: var(--muted);
}

h1 {
  margin: 10px 0;
  font-family: 'Cinzel', serif;
  font-size: clamp(2.4rem, 5vw, 4.2rem);
  color: #efe5d0;
}

.subtitle {
  margin: 18px auto 0;
  max-width: 760px;
  color: #c8bfae;
}

/* =========================
   HERO BUTTONS (FIXED)
========================= */
.top-actions {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 240px));
  justify-content: center;
  gap: 14px;
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
}

.top-actions .mist-button,
.top-actions .secondary-button {
  width: 100%;
  text-align: center;
}

/* =========================
   BUTTON BASE
========================= */
.mist-button,
.secondary-button,
.small-button {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 14px 22px;
  color: #efe5d0;
  border: 1px solid rgba(202, 183, 143, 0.4);
  background: rgba(255,255,255,0.03);
  transition: all 0.3s ease;
  cursor: pointer;
}

.mist-button:hover,
.secondary-button:hover,
.small-button:hover {
  transform: translateY(-2px);
  border-color: rgba(202, 183, 143, 0.7);
}

/* =========================
   SMALL BUTTONS (toolbar etc)
========================= */
.small-button {
  padding: 10px 14px;
  font-size: 0.75rem;
}

/* =========================
   TOOLBAR
========================= */
.toolbar {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 24px;
  padding: 18px;
  border: 1px solid var(--line);
  background: var(--panel);
}

/* =========================
   STATUS BAR
========================= */
.status-bar {
  margin-bottom: 18px;
  padding: 14px;
  text-align: center;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.02);
}

/* =========================
   ENTRY CARD
========================= */
.entry {
  border: 1px solid var(--line);
  background: var(--panel-strong);
  margin-bottom: 18px;
}

/* =========================
   INPUTS
========================= */
.entry-input,
.entry-date,
.entry-textarea {
  width: 100%;
  padding: 14px;
  border: 1px solid rgba(202, 183, 143, 0.18);
  background: rgba(255,255,255,0.03);
  color: var(--text);
}

.entry-textarea {
  min-height: 200px;
}

/* =========================
   ACTION BUTTONS (SAVE/DELETE)
========================= */
.entry-actions {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.delete-btn {
  border-color: rgba(159, 93, 93, 0.5);
}

.delete-btn:hover {
  border-color: rgba(159, 93, 93, 0.8);
}

/* =========================
   MOBILE
========================= */
@media (max-width: 640px) {

  .top-actions {
    grid-template-columns: 1fr;
  }

  .top-actions .mist-button,
  .top-actions .secondary-button {
    width: 100%;
  }

  .entry-actions {
    flex-direction: column;
  }
}
</style>
</head>
<body>
  <div class="mist"></div>

  <div class="ash" aria-hidden="true">
    <span style="left: 4%; animation-duration: 18s; animation-delay: -3s;"></span>
    <span style="left: 11%; animation-duration: 24s; animation-delay: -9s;"></span>
    <span style="left: 18%; animation-duration: 20s; animation-delay: -5s;"></span>
    <span style="left: 26%; animation-duration: 27s; animation-delay: -11s;"></span>
    <span style="left: 33%; animation-duration: 19s; animation-delay: -4s;"></span>
    <span style="left: 40%; animation-duration: 25s; animation-delay: -14s;"></span>
    <span style="left: 47%; animation-duration: 21s; animation-delay: -7s;"></span>
    <span style="left: 54%; animation-duration: 29s; animation-delay: -17s;"></span>
    <span style="left: 61%; animation-duration: 23s; animation-delay: -6s;"></span>
    <span style="left: 68%; animation-duration: 18s; animation-delay: -8s;"></span>
    <span style="left: 75%; animation-duration: 30s; animation-delay: -12s;"></span>
    <span style="left: 82%; animation-duration: 22s; animation-delay: -10s;"></span>
    <span style="left: 89%; animation-duration: 26s; animation-delay: -15s;"></span>
    <span style="left: 95%; animation-duration: 20s; animation-delay: -2s;"></span>
  </div>

  <main class="page-wrap">
    <section class="hero">
      <div class="eyebrow">The Mists of Radjya</div>
      <h1>Session Journal</h1>
      <p class="subtitle">
        A living record of roads taken, names spoken, bargains made, and truths that should probably have stayed buried.
      </p>

      <div class="top-actions">
        <a href="../index.html" class="secondary-button">Return</a>
        <button class="mist-button" id="addSessionBtn" type="button">New Session</button>
      </div>
    </section>

    <section class="status-bar" id="globalStatus">
      Connecting to the archive...
    </section>

    <section class="toolbar">
      <button class="small-button" id="expandAllBtn" type="button">Expand All</button>
      <button class="small-button" id="collapseAllBtn" type="button">Collapse All</button>
      <button class="small-button" id="exportBtn" type="button">Export Notes</button>
    </section>

    <section class="entry-list" id="entryList"></section>

    <div class="footer-note">
      The Mists forget nothing. Your notes shouldn’t have to, either.
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://hhonnlwjduygzjjvrkqm.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_ZhWeT66imNvwDfG7g5syPw_SUlKkF-_";

  const globalStatus = document.getElementById("globalStatus");
  const entryList = document.getElementById("entryList");
  const addSessionBtn = document.getElementById("addSessionBtn");
  const expandAllBtn = document.getElementById("expandAllBtn");
  const collapseAllBtn = document.getElementById("collapseAllBtn");
  const exportBtn = document.getElementById("exportBtn");

  let supabaseClient = null;

  function setStatus(message) {
    globalStatus.textContent = message;
  }

  try {
    if (!window.supabase) {
      throw new Error("Supabase library failed to load.");
    }

    if (
      !SUPABASE_URL ||
      !SUPABASE_ANON_KEY ||
      SUPABASE_ANON_KEY.includes("PASTE_YOUR")
    ) {
      throw new Error("Supabase URL or publishable key is missing.");
    }

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    setStatus("Archive connected.");
  } catch (err) {
    console.error("Supabase init error:", err);
    setStatus("Archive failed to connect. Open F12 → Console.");
  }

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatPrettyDate(dateString) {
    if (!dateString) return "Undated";
    const d = new Date(dateString + "T12:00:00");
    if (Number.isNaN(d.getTime())) return dateString;
    return d.toLocaleDateString(undefined, {
      year: "numeric",
      month: "long",
      day: "numeric"
    });
  }

  function previewText(text) {
    if (!text || !text.trim()) {
      return "No notes written yet. Open this entry and start chronicling the chaos.";
    }
    const cleaned = text.trim().replace(/\n+/g, " ");
    return cleaned.length > 160 ? cleaned.slice(0, 160) + "..." : cleaned;
  }

  async function loadEntries() {
    if (!supabaseClient) return [];

    const { data, error } = await supabaseClient
      .from("session_notes")
      .select("*")
      .order("session_date", { ascending: false })
      .order("created_at", { ascending: false });

    if (error) {
      console.error("Load error:", error);
      setStatus("Could not load notes. Check table name and RLS policies.");
      return [];
    }

    return data || [];
  }

  async function createEntry() {
    if (!supabaseClient) {
      setStatus("Supabase is not connected.");
      return;
    }

    const existing = await loadEntries();
    const nextNumber = existing.length + 1;
    const today = new Date().toISOString().split("T")[0];

    const { error } = await supabaseClient
      .from("session_notes")
      .insert([{
        title: `Session ${nextNumber}`,
        session_date: today,
        notes: ""
      }]);

    if (error) {
      console.error("Create error:", error);
      setStatus("Could not create a new session entry.");
      return;
    }

    setStatus("New session entry created.");
    await renderEntries(true);
  }

  async function saveEntry(id, payload, statusEl = null) {
    if (!supabaseClient) return;

    const { error } = await supabaseClient
      .from("session_notes")
      .update(payload)
      .eq("id", id);

    if (error) {
      console.error("Save error:", error);
      if (statusEl) statusEl.textContent = "Save failed";
      setStatus("Could not save entry.");
      return;
    }

    if (statusEl) statusEl.textContent = "Saved";
    setStatus("Changes saved.");
  }

  async function deleteEntry(id) {
    if (!supabaseClient) return;

    const confirmed = window.confirm("Delete this session entry?");
    if (!confirmed) return;

    const { error } = await supabaseClient
      .from("session_notes")
      .delete()
      .eq("id", id);

    if (error) {
      console.error("Delete error:", error);
      setStatus("Could not delete entry.");
      return;
    }

    setStatus("Session entry deleted.");
    await renderEntries();
  }

  async function exportNotes() {
    const entries = await loadEntries();
    if (!entries.length) {
      setStatus("Nothing to export yet.");
      return;
    }

    const ordered = [...entries].sort((a, b) => {
      const aDate = new Date(a.session_date || 0);
      const bDate = new Date(b.session_date || 0);
      return aDate - bDate;
    });

    const text = ordered.map(entry =>
      `${entry.title || "Untitled Session"} (${formatPrettyDate(entry.session_date)})\n\n${entry.notes || "[No notes]"}\n\n${"-".repeat(60)}\n`
    ).join("\n");

    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "mistwalker-session-notes.txt";
    a.click();
    URL.revokeObjectURL(url);

    setStatus("Notes exported.");
  }

  function bindEntryEvents() {
    document.querySelectorAll(".save-btn").forEach((button) => {
      button.addEventListener("click", async () => {
        const id = button.dataset.id;
        const wrapper = button.closest(".entry-content-inner");
        const title = wrapper.querySelector(".entry-input").value.trim() || "Untitled Session";
        const sessionDate = wrapper.querySelector(".entry-date").value;
        const notes = wrapper.querySelector(".entry-textarea").value;
        const statusEl = wrapper.querySelector(".save-status");

        statusEl.textContent = "Saving...";
        await saveEntry(id, { title, session_date: sessionDate || null, notes }, statusEl);

        const details = wrapper.closest("details");
        if (details) {
          details.querySelector(".entry-title").textContent = title;
          details.querySelector(".entry-preview").textContent = previewText(notes);
          details.querySelector(".entry-date-display").textContent = formatPrettyDate(sessionDate);
        }
      });
    });

    document.querySelectorAll(".delete-btn").forEach((button) => {
      button.addEventListener("click", async () => {
        await deleteEntry(button.dataset.id);
      });
    });
  }

  async function renderEntries(openNewest = false) {
    const entries = await loadEntries();

    if (!entries.length) {
      entryList.innerHTML = `
        <div class="empty-state">
          No session records yet.<br>
          Click <strong>New Session</strong> to begin your archive.
        </div>
      `;
      return;
    }

    entryList.innerHTML = entries.map((entry, index) => `
      <details class="entry" ${openNewest && index === 0 ? "open" : ""}>
        <summary>
          <div class="entry-meta">
            <span class="entry-date-display">${escapeHtml(formatPrettyDate(entry.session_date))}</span>
            <span>Session Record</span>
          </div>
          <h2 class="entry-title">${escapeHtml(entry.title || "Untitled Session")}</h2>
          <p class="entry-preview">${escapeHtml(previewText(entry.notes))}</p>
        </summary>

        <div class="entry-content">
          <div class="entry-content-inner">
            <div class="field-grid">
              <div>
                <label class="entry-label">Session Title</label>
                <input class="entry-input" type="text" value="${escapeHtml(entry.title || "")}">
              </div>
              <div>
                <label class="entry-label">Session Date</label>
                <input class="entry-date" type="date" value="${entry.session_date || ""}">
              </div>
            </div>

            <label class="entry-label">Session Notes</label>
            <textarea class="entry-textarea">${escapeHtml(entry.notes || "")}</textarea>

            <div class="entry-actions">
              <button class="small-button save-btn" type="button" data-id="${entry.id}">Save Now</button>
              <button class="small-button delete-btn" type="button" data-id="${entry.id}">Delete Session</button>
              <span class="save-status">Saved</span>
            </div>
          </div>
        </div>
      </details>
    `).join("");

    bindEntryEvents();
  }

  addSessionBtn.addEventListener("click", createEntry);
  expandAllBtn.addEventListener("click", () => {
    document.querySelectorAll(".entry").forEach(entry => entry.open = true);
  });
  collapseAllBtn.addEventListener("click", () => {
    document.querySelectorAll(".entry").forEach(entry => entry.open = false);
  });
  exportBtn.addEventListener("click", exportNotes);

  renderEntries();
</script>
</body>
</html>
